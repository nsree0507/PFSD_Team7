<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Helpdesk Routing System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2333;
    --bg-card-hover: #21283a;
    --surface: #252d3d;
    --surface-light: #2d3748;
    --border: rgba(99,130,191,0.15);
    --border-bright: rgba(99,130,191,0.3);
    --accent-blue: #4f8ef7;
    --accent-cyan: #38bdf8;
    --accent-purple: #a78bfa;
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --text-primary: #e2e8f0;
    --text-secondary: #8b9ab5;
    --text-muted: #4a5568;
    --glow-blue: rgba(79,142,247,0.15);
    --glow-cyan: rgba(56,189,248,0.12);
    --sidebar-w: 230px;
    --header-h: 64px;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
    --shadow-glow: 0 0 30px rgba(79,142,247,0.12);
  }

  [data-theme="light"] {
    --bg-primary: #f0f4f8;
    --bg-secondary: #e8edf4;
    --bg-card: #ffffff;
    --bg-card-hover: #f7f9fc;
    --surface: #edf1f7;
    --surface-light: #e2e8f0;
    --border: rgba(99,130,191,0.18);
    --border-bright: rgba(79,142,247,0.35);
    --accent-blue: #2563eb;
    --accent-cyan: #0891b2;
    --accent-purple: #7c3aed;
    --accent-green: #059669;
    --accent-orange: #ea580c;
    --accent-red: #dc2626;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --glow-blue: rgba(37,99,235,0.1);
    --glow-cyan: rgba(8,145,178,0.08);
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --shadow-glow: 0 0 30px rgba(37,99,235,0.08);
  }


  [data-theme="light"] {
    --bg-primary: #f0f4f8;
    --bg-secondary: #e8edf4;
    --bg-card: #ffffff;
    --bg-card-hover: #f7f9fc;
    --surface: #edf1f7;
    --surface-light: #e2e8f0;
    --border: rgba(99,130,191,0.18);
    --border-bright: rgba(79,142,247,0.35);
    --accent-blue: #2563eb;
    --accent-cyan: #0891b2;
    --accent-purple: #7c3aed;
    --accent-green: #059669;
    --accent-orange: #ea580c;
    --accent-red: #dc2626;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --glow-blue: rgba(37,99,235,0.1);
    --glow-cyan: rgba(8,145,178,0.08);
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --shadow-glow: 0 0 30px rgba(37,99,235,0.08);
  }

  html { transition: background 0.3s, color 0.3s; }
  html, body { transition: background 0.25s, color 0.25s; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1, h2, h3, h4, h5, .syne { font-family: 'Syne', sans-serif; }

  /* ── PARTICLES ── */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── AUTH PAGES ── */
  .auth-root {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .auth-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow), var(--shadow-glow);
    position: relative;
    z-index: 2;
  }

  .auth-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .auth-logo .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .auth-logo .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .auth-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .form-input:focus {
    border-color: var(--accent-blue);
    background: var(--surface-light);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }

  .form-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent-blue), #3a7fe8);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    margin-top: 8px;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(79,142,247,0.35);
  }

  .auth-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .auth-link a {
    color: var(--accent-cyan);
    text-decoration: none;
    cursor: pointer;
    font-weight: 500;
  }

  .auth-link a:hover { text-decoration: underline; }

  /* ── LANDING ── */
  .landing-root {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    z-index: 1;
  }

  .landing-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 16px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent-cyan);
    margin-bottom: 28px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .landing-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 800;
    text-align: center;
    line-height: 1.08;
    margin-bottom: 20px;
    max-width: 780px;
  }

  .landing-title .grad {
    background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .landing-desc {
    font-size: 17px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 540px;
    line-height: 1.65;
    margin-bottom: 40px;
  }

  .landing-btns {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 64px;
  }

  .btn-land-primary {
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.02em;
  }

  .btn-land-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(79,142,247,0.4);
  }

  .btn-land-outline {
    padding: 14px 32px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.02em;
  }

  .btn-land-outline:hover {
    background: var(--surface);
    border-color: var(--accent-blue);
    transform: translateY(-2px);
  }

  .btn-land-ghost {
    padding: 14px 32px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-secondary);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.02em;
  }

  .btn-land-ghost:hover {
    background: var(--surface);
    color: var(--text-primary);
    transform: translateY(-2px);
  }

  .stats-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-pill {
    background: rgba(22,27,34,0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 28px;
    text-align: center;
    min-width: 140px;
  }

  .stat-pill .val {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-pill .lbl {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ── DASHBOARD SHELL ── */
  .app-shell {
    display: flex;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: all 0.3s;
  }

  .sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .sidebar-logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    position: relative;
  }

  .nav-item:hover {
    background: var(--surface);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(79,142,247,0.18), rgba(56,189,248,0.1));
    color: var(--accent-blue);
    border: 1px solid rgba(79,142,247,0.2);
  }

  .nav-item.active .nav-icon { color: var(--accent-cyan); }

  .nav-icon {
    font-size: 17px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .sidebar-footer {
    padding: 14px 10px;
    border-top: 1px solid var(--border);
  }

  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 9px;
    background: var(--surface);
  }

  .user-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .user-info .user-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .user-info .user-role {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── MAIN CONTENT ── */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .top-header {
    height: var(--header-h);
    background: var(--bg-secondary);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.18s;
    position: relative;
  }

  .icon-btn:hover {
    background: var(--surface-light);
    color: var(--text-primary);
    border-color: var(--border-bright);
  }

  .notif-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 7px; height: 7px;
    background: var(--accent-red);
    border-radius: 50%;
    border: 1.5px solid var(--bg-secondary);
  }

  .btn-logout {
    padding: 8px 18px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 8px;
    color: var(--accent-red);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-logout:hover {
    background: rgba(248,113,113,0.18);
  }


  /* ── THEME TOGGLE ── */
  .theme-toggle-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 100px;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .theme-toggle-btn:hover {
    background: var(--surface-light);
    color: var(--text-primary);
    border-color: var(--accent-blue);
  }
  .theme-track {
    width: 32px; height: 17px;
    background: var(--surface-light);
    border-radius: 100px;
    position: relative;
    border: 1px solid var(--border-bright);
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .theme-track.on {
    background: linear-gradient(135deg, #4f8ef7, #38bdf8);
    border-color: transparent;
  }
  .theme-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 11px; height: 11px;
    background: white;
    border-radius: 50%;
    transition: all 0.25s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .theme-track.on::after { left: 17px; }

  /* ── PAGE CONTENT ── */
  .page-content {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }

  .card:hover {
    border-color: var(--border-bright);
    box-shadow: var(--shadow), var(--shadow-glow);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── STAT CARDS ── */
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-bright);
    box-shadow: var(--shadow), var(--shadow-glow);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.blue::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .stat-card.green::before { background: linear-gradient(90deg, var(--accent-green), #10b981); }
  .stat-card.orange::before { background: linear-gradient(90deg, var(--accent-orange), #f59e0b); }

  .stat-card-icon {
    width: 44px; height: 44px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 14px;
  }

  .stat-card.blue .stat-card-icon { background: rgba(79,142,247,0.12); }
  .stat-card.green .stat-card-icon { background: rgba(52,211,153,0.12); }
  .stat-card.orange .stat-card-icon { background: rgba(251,146,60,0.12); }

  .stat-card-val {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-card-lbl {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .stat-card-change {
    font-size: 12px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .change-up { color: var(--accent-green); }
  .change-down { color: var(--accent-red); }

  /* ── PANELS ── */
  .panels-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .feed-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .feed-item:last-child { border-bottom: none; }

  .feed-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .feed-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 3px;
  }

  .feed-item-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

<script>
// Particle animation
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.4,
      dx: (Math.random() - 0.5) * 0.35,
      dy: (Math.random() - 0.5) * 0.35,
      alpha: Math.random() * 0.5 + 0.1,
      hue: Math.random() > 0.5 ? 210 : 190,
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 90 }, createParticle);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 65%, ${p.alpha})`;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `hsla(${p.hue}, 80%, 65%, 0.5)`;
      ctx.fill();
      ctx.shadowBlur = 0;
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > W) p.dx *= -1;
      if (p.y < 0 || p.y > H) p.dy *= -1;
    });
    requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', init);
})();
</script>

const NAV_ITEMS = [

  departments:'Departments', analytics:'Analytics',
  history:'Ticket History', settings:'Settings'

    switch(activePage) {

      case 'submit': return <SubmitQueryPage />;

      <div className="main-content">

          <div className="header-title">{PAGE_TITLES[activePage]}</div>
          <div className="header-right">
            <button className="theme-toggle-btn" onClick={toggleTheme} title="Toggle theme">
              <span>{darkMode ? '☀️' : '🌙'}</span>

              <span style={{fontSize:'11px',fontWeight:'600'}}>{darkMode ? 'Light' : 'Dark'}</span>
            </button>
            <div className="icon-btn" title="Notifications">

              <div className="notif-dot"></div>

// ─── ROOT APP ─────────────────────────────────────
function App() {
  const [page, setPage] = useState('landing');
  const [darkMode, setDarkMode] = useState(true);

  const toggleTheme = () => {
    const next = !darkMode;
    setDarkMode(next);
    document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
  };

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  }, []);

  return (
    <>
      {page === 'landing' && (
        <LandingPage
          onSignIn={() => setPage('login')}
          onSignUp={() => setPage('signup')}
          onDashboard={() => setPage('dashboard')}
          darkMode={darkMode}
          toggleTheme={toggleTheme}
        />
      )}
      {page === 'login' && (
        <LoginPage
          onLogin={() => setPage('dashboard')}
          onSignup={() => setPage('signup')}
          onBack={() => setPage('landing')}
          darkMode={darkMode}
          toggleTheme={toggleTheme}
        />
      )}
      {page === 'signup' && (
        <SignupPage
          onLogin={() => setPage('dashboard')}
          onBack={() => setPage('login')}
          darkMode={darkMode}
          toggleTheme={toggleTheme}
        />
      )}
      {page === 'dashboard' && (
        <Dashboard onLogout={() => setPage('landing')} darkMode={darkMode} toggleTheme={toggleTheme} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
